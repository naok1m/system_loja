databases:
  - name: loja-system-db
    plan: free
    databaseName: loja_system
    user: loja_user

services:
  - type: web
    name: loja-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: loja-system-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.13.0
